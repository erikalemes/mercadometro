name: Coleta diária de preços

on:
  schedule:
    - cron: "0 9 * * *"   # 06:00 em Goiânia (UTC-3)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Coletar preços do Atacadão
        run: python scripts/coletar.py

      - name: Publicar dados atualizados
        run: |
          git config user.name "mercadometro-bot"
          git config user.email "github-actions@users.noreply.github.com"
          git add docs/dados.js docs/historico.js
          if git diff --cached --quiet; then
            echo "Sem mudanças para publicar."
          else
            git commit -m "Coleta de preços $(date -u +%Y-%m-%d)"
            git push
          fi
